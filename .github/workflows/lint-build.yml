name: Lint & Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --verbose
        timeout-minutes: 5

      - name: Run linter
        run: npm run lint
        timeout-minutes: 5

      - name: Build project
        run: npm run build
        timeout-minutes: 10
