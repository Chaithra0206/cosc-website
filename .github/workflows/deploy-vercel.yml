name: Deploy to Vercel

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --verbose
        timeout-minutes: 5

      # --- 1. PREVIEW DEPLOYMENT (For Pull Requests) ---
      
      - name: Pull Vercel Environment (Preview)
        if: github.event_name == 'pull_request'
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN_PREVIEW }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PREVIEW }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PREVIEW }}

      - name: Build with Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN_PREVIEW }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PREVIEW }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PREVIEW }}

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: vercel_preview
        run: |
          url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN_PREVIEW }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PREVIEW }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PREVIEW }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.vercel_preview.outputs.url }}';
            const body = `Vercel Preview ready!\n\n[View Deployment](${url})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      # --- 2. PRODUCTION DEPLOYMENT (For Merge to Main/Master) ---

      - name: Pull Vercel Environment (Production)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN_PROD }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PROD }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Build and Deploy (Production)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: vercel_deploy_prod
        run: |
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN_PROD }}
          deployment_url=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_PROD }})
          echo "PROD_URL=$deployment_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_PROD }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Generate Deployment Summary
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          echo "Production Status" >> $GITHUB_STEP_SUMMARY
          echo "The latest build has been pushed to Vercel." >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.vercel_deploy_prod.outputs.PROD_URL }}" >> $GITHUB_STEP_SUMMARY