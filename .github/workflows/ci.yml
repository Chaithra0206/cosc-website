name: CI - Lint & Build

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      #  Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Setup Node 20 (required for Next.js 16)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      #  Install dependencies
      - name: Install dependencies
        run: npm ci

      #  Run Lint
      - name: Run Lint
        run: npm run lint

      #  Build Next.js
      - name: Build Project
        run: npm run build
